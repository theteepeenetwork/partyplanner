<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Browse Services — Direction A (standalone reference)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Spline+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="browse.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--pp-cream); }
  /* host the single prototype full-viewport for this reference page */
  #root, .pp-host { height: 100vh; }
  /* toggle to preview the mobile layout: add class "mobile" to .pp-host */
  .pp-host.mobile { max-width: 392px; margin: 0 auto; box-shadow: 0 0 0 1px var(--pp-line); }
  .pp-no-ratings .pp-rating { display: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="directionA.jsx"></script>

<script type="text/babel" data-presets="react">
  // Standalone host for Direction A. Flip `mobile` to preview the responsive layout,
  // flip `startEmpty` to preview the no-event state.
  function Host() {
    const mobile = false;
    const startEmpty = false;
    return (
      <div className={'pp-host' + (mobile ? ' mobile' : '')}>
        <DirectionA mobile={mobile} startEmpty={startEmpty} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Host />);
</script>
</body>
</html>
